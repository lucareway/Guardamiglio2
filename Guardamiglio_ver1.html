// ══════════════════════════════════════════════════════════════════════════════
//  PARSE CSV ROBUSTO
// ══════════════════════════════════════════════════════════════════════════════
function parseCSVRaw(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });
}

// ══════════════════════════════════════════════════════════════════════════════
//  CARICAMENTO DATI
// ══════════════════════════════════════════════════════════════════════════════
async function fetchCSV(url) {
  const res = await fetch(url + '&nocache=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.text();
}

function parseProspetto(text) {
  const rows = parseCSVRaw(text);
  // Riga 0 = header (skip)
  return rows.slice(1)
    .filter(cols => (cols[1] || '').trim() === CANTIERE_COMMESSA)
    .map(cols => {
      // A=0 B=1 C=2 D=3 E=4 F=5 G=6 H=7 I=8 J=9 K=10 L=11 ... N=13 ... AF=31
      const colB  = cols[1]  || '';  // commessa
      const colE  = cols[4]  || '';  // tipologia
      const colF  = cols[5]  || '';  // matricola/targa
      const colG  = cols[6]  || '';  // marca e modello
      const colH  = cols[7]  || '';  // proprietà/noleggio
      const colI  = cols[8]  || '';  // proprietario
      const colJ  = cols[9]  || '';  // canone J
      const colK  = cols[10] || '';  // canone K
      const colL  = cols[11] || '';  // canone L
      const colN  = cols[13] || '';  // data inizio noleggio
      const colAF = cols[31] || '';  // stato esportato

      // Il canone è il primo tra J,K,L non vuoto
      const canone = [colJ, colK, colL].find(v => v && v.trim()) || '';

      // Stato dal foglio
      const statoRaw = colAF.trim().toLowerCase();
      const statoSheet = statoRaw.includes('reso') ? 'reso'
                       : statoRaw.includes('spostato') ? 'spostato'
                       : null;

      return {
        commessa: colB,
        tipo:     colE.toUpperCase(),
        codice:   colF,   // matricola = chiave stabile
        marca:    colG,
        propNol:  colH,
        proprietario: colI,
        canone,
        dataInizio: colN,
        statoSheet,
        statoAF:  colAF,
        destinazioneAF: statoRaw.includes('spostato in') ? colAF.replace(/^spostato in\s*/i, '').trim() : '',
      };
    })
    .filter(d => d.codice); // scarta righe senza matricola
}

function parseCodiciCommessa(text) {
  const rows = parseCSVRaw(text);
  return rows.slice(1)
    .map(cols => ({ codice: (cols[1]||'').trim(), desc: (cols[2]||'').trim() }))
    .filter(c => c.codice);
}

function parseDbMezzi(text) {
  const rows = parseCSVRaw(text);
  // D=3 tipologia, E=4 matricola, F=5 marca/modello
  return rows.slice(1).map(cols => ({
    tipologia: (cols[3] || '').trim(),
    matricola: (cols[4] || '').trim(),
    marca:     (cols[5] || '').trim(),
  })).filter(r => r.matricola || r.marca);
}

async function loadData() {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot loading';
  lbl.textContent = 'Aggiornamento...';
  try {
    const [txtPros, txtCod, txtDb] = await Promise.all([
      fetchCSV(CSV_PROSPETTO),
      fetchCSV(CSV_CODICI),
      fetchCSV(CSV_DB_MEZZI),
    ]);

    data = parseProspetto(txtPros);
    codiciCommessa = parseCodiciCommessa(txtCod);
    dbMezzi = parseDbMezzi(txtDb);

    // Applica stato dal foglio (fonte di verità)
    stati = {};
    data.forEach(d => {
      if (d.statoSheet) {
        stati[d.codice] = d.statoSheet;
        if (d.statoSheet === 'spostato' && d.destinazioneAF) {
          destinazioni[d.codice] = d.destinazioneAF;
        }
      }
    });
    saveStati();

    const now = new Date().toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
    dot.className = 'sync-dot';
    lbl.textContent = `Aggiornato alle ${now} · ${data.length} mezzi`;
    renderFilters();
    render();
  } catch(e) {
    dot.className = 'sync-dot error';
    lbl.textContent = 'Errore di connessione';
    document.getElementById('cards').innerHTML = '<div class="empty">Impossibile caricare i dati.<br>Verifica la connessione e riprova.</div>';
    console.error(e);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  FILTRI E RENDER
// ══════════════════════════════════════════════════════════════════════════════
function getTypes() {
  const types = ['Tutti', ...new Set(data.map(d => d.tipo).filter(Boolean))].sort((a,b) => a === 'Tutti' ? -1 : a.localeCompare(b));
  types.push('RESO', 'SPOSTATO IN');
  return types;
}

function renderFilters() {
  document.getElementById('filters').innerHTML = getTypes().map(t => {
    const extra = t === 'RESO' ? 'reso-chip' : t === 'SPOSTATO IN' ? 'spostato-chip' : '';
    return `<span class="chip ${extra} ${t===activeFilter?'active':''}" onclick="setFilter('${t}')">${t}</span>`;
  }).join('');
}

function setFilter(t) { activeFilter = t; renderFilters(); render(); }

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return data.filter(d => {
    let mF;
    if      (activeFilter === 'Tutti')       mF = true;
    else if (activeFilter === 'RESO')        mF = stati[d.codice] === 'reso';
    else if (activeFilter === 'SPOSTATO IN') mF = stati[d.codice] === 'spostato';
    else                                     mF = d.tipo === activeFilter;
    const mQ = !q || [d.tipo, d.marca, d.propNol, d.proprietario, d.codice].join(' ').toLowerCase().includes(q);
    return mF && mQ;
  });
}

function fmtCanone(val) {
  if (!val) return '—';
  // prova a formattare come valuta se numerico
  const n = parseFloat(val.replace(',', '.').replace(/[^0-9.]/g,''));
  if (!isNaN(n) && n > 0) {
    return new Intl.NumberFormat('it-IT', { style:'currency', currency:'EUR' }).format(n);
  }
  return val;
}

function render() {
  const items = filtered();
  document.getElementById('count').textContent = items.length + (items.length === 1 ? ' mezzo trovato' : ' mezzi trovati');
  if (!items.length) {
    document.getElementById('cards').innerHTML = '<div class="empty">Nessun risultato trovato.<br>Prova a cambiare il filtro o la ricerca.</div>';
    return;
  }
  document.getElementById('cards').innerHTML = items.map(d => {
    const c = BADGE_COLORS[d.tipo] || BADGE_COLORS.DEFAULT;
    const stato = stati[d.codice];
    const statoClass = stato ? 'stato-' + stato : '';
    const statoBadge = stato === 'reso'
      ? '<span class="stato-badge reso">RESO AL NOLEGGIATORE</span>'
      : stato === 'spostato'
      ? `<span class="stato-badge spostato">SPOSTATO IN ${destinazioni[d.codice] || ''}</span>`
      : '';
    return `<div class="card ${statoClass}" data-codice="${esc(d.codice)}" onclick="openModal(this.dataset.codice)">
      <div class="card-top">
        <div class="card-title">${esc(d.marca) || '—'}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="badge" style="background:${c.bg};color:${c.fg}">${d.tipo || '—'}</span>
          ${statoBadge}
        </div>
      </div>
      <div class="card-meta">
        <div class="meta-row"><span class="meta-label">Matricola</span><span class="meta-value">${esc(d.codice) || '—'}</span></div>
        <div class="meta-row"><span class="meta-label">Proprietà</span><span class="meta-value">${esc(d.propNol) || '—'}</span></div>
        <div class="meta-row"><span class="meta-label">Proprietario</span><span class="meta-value">${esc(d.proprietario) || '—'}</span></div>
        ${d.canone ? `<div class="meta-row"><span class="meta-label">Canone</span><span class="meta-value">${esc(fmtCanone(d.canone))}</span></div>` : ''}
        ${d.dataInizio ? `<div class="meta-row"><span class="meta-label">Inizio noleggio</span><span class="meta-value">${esc(d.dataInizio)}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════════════
//  MODAL DETTAGLIO
// ══════════════════════════════════════════════════════════════════════════════
function openModal(codice) {
  currentId = codice;
  const d = data.find(x => x.codice === codice);
  if (!d) return;
  const c = BADGE_COLORS[d.tipo] || BADGE_COLORS.DEFAULT;
  const stato = stati[codice];

  document.getElementById('modal-badge').innerHTML =
    `<span class="badge" style="background:${c.bg};color:${c.fg};display:inline-block">${d.tipo || '—'}</span>`
    + (stato === 'reso'     ? '<span class="stato-badge reso">RESO AL NOLEGGIATORE</span>' : '')
    + (stato === 'spostato' ? `<span class="stato-badge spostato">SPOSTATO IN${destinazioni[codice] ? ' ' + destinazioni[codice] : ''}</span>` : '');

  document.getElementById('modal-title').textContent = d.marca || 'Dettaglio mezzo';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-field"><label>Marca e Modello</label><div class="val">${esc(d.marca) || '—'}</div></div>
    <div class="modal-field"><label>Matricola / Targa</label><div class="val ${!d.codice?'empty-val':''}">${esc(d.codice) || 'Non specificata'}</div></div>
    <div class="modal-field"><label>Tipologia</label><div class="val">${esc(d.tipo) || '—'}</div></div>
    <div class="modal-field"><label>Proprietà / Noleggio</label><div class="val ${!d.propNol?'empty-val':''}">${esc(d.propNol) || 'Non specificato'}</div></div>
    <div class="modal-field"><label>Proprietario</label><div class="val ${!d.proprietario?'empty-val':''}">${esc(d.proprietario) || 'Non specificato'}</div></div>
    <div class="modal-field"><label>Canone</label><div class="val ${!d.canone?'empty-val':''}">${esc(fmtCanone(d.canone))}</div></div>
    <div class="modal-field"><label>Data inizio noleggio</label><div class="val ${!d.dataInizio?'empty-val':''}">${esc(d.dataInizio) || 'Non specificata'}</div></div>
  `;

  document.getElementById('btn-reso').className     = 'btn-stato btn-reso'     + (stato === 'reso'     ? ' attivo' : '');
  document.getElementById('btn-spostato').className = 'btn-stato btn-spostato' + (stato === 'spostato' ? ' attivo' : '');
  document.getElementById('spostato-panel').classList.remove('open');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

// ══════════════════════════════════════════════════════════════════════════════
//  PANEL SPOSTATO — destinazioni da CODICI_COMMESSA
// ══════════════════════════════════════════════════════════════════════════════
function renderDestOptions() {
  const q = (document.getElementById('dest-search').value || '').toLowerCase();
  const list = document.getElementById('spostato-options-list');
  const opzioni = codiciCommessa
    .filter(c => c.codice !== CANTIERE_COMMESSA) // escludi il cantiere corrente
    .filter(c => !q || (c.codice + ' ' + c.desc).toLowerCase().includes(q));

  list.innerHTML = opzioni.map((c, i) => {
    const val = `${c.codice} ${c.desc}`.trim();
    return `<label class="spostato-option" id="opt-dest-${i}" onclick="selezionaDestOption(this)">
      <input type="radio" name="spostato-dest" value="${esc(val)}"> ${esc(val)}
    </label>`;
  }).join('');

  // re-bind change handlers
  list.querySelectorAll('input[type=radio]').forEach(r => {
    r.onchange = () => {
      document.querySelectorAll('.spostato-option').forEach(o => o.classList.remove('selected'));
      r.closest('.spostato-option').classList.add('selected');
    };
  });
}

function selezionaDestOption(el) {
  document.querySelectorAll('.spostato-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function openSpostatoPanel() {
  const panel = document.getElementById('spostato-panel');
  panel.classList.toggle('open');
  document.getElementById('dest-search').value = '';
  document.getElementById('dest-libera').value = '';
  renderDestOptions();
}

function confirmSpostato() {
  const selected = document.querySelector('input[name="spostato-dest"]:checked');
  if (!selected) { showToast('⚠️ Seleziona una destinazione'); return; }
  let dest = selected.value;
  if (dest === '__altro__') {
    dest = document.getElementById('dest-libera').value.trim();
    if (!dest) { showToast('⚠️ Scrivi una destinazione'); return; }
  }
  setStato('spostato', dest);
  document.getElementById('spostato-panel').classList.remove('open');
}

function setStato(valore, destinazione) {
  if (currentId === null) return;
  if (valore === null) {
    delete stati[currentId];
    delete destinazioni[currentId];
    document.getElementById('spostato-panel').classList.remove('open');
  } else {
    stati[currentId] = valore;
    if (destinazione) destinazioni[currentId] = destinazione;
  }
  saveStati();
  render();
  openModal(currentId);
}

// ══════════════════════════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════════════════════════
function showToast(msg, duration = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ══════════════════════════════════════════════════════════════════════════════
//  ESPORTA → colonna AF foglio
// ══════════════════════════════════════════════════════════════════════════════
async function openExport() {
  const btn = document.getElementById('export-btn');
  const conStato = data.filter(d => stati[d.codice]);

  if (!conStato.length) {
    showToast('⚠️ Nessun mezzo ha uno stato assegnato.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Esportazione...';

  const payload = conStato.map(d => ({
    matricola: d.codice.trim(),
    stato: stati[d.codice] === 'reso' ? 'RESO AL NOLEGGIATORE' : 'SPOSTATO IN ' + (destinazioni[d.codice] || ''),
    destinazione: destinazioni[d.codice] || ''
  }));

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (json.status === 'ok') {
      const msg = json.aggiornati > 0
        ? `✅ ${json.aggiornati} mezzi scritti sul foglio!` + (json.nonTrovati > 0 ? ` (${json.nonTrovati} matricole non trovate)` : '')
        : `⚠️ Nessuna matricola trovata nel foglio. Verifica i codici.`;
      showToast(msg, 5000);
    } else {
      showToast('❌ Errore: ' + (json.error || 'risposta non valida'), 5000);
    }
  } catch(e) {
    showToast('❌ Connessione fallita: ' + e.message, 5000);
  } finally {
    btn.disabled = false;
    btn.textContent = 'ESPORTA';
  }
}

//  MODAL AGGIUNGI MEZZO — con autocomplete da DB_MEZZI_LINKED

let selTipologia = '';
let selMarca     = '';

function openInsertModal() {
  document.getElementById('ins-tipologia').value = '';
  document.getElementById('ins-marca').value = '';
  document.getElementById('ins-matricola').value = '';
  selTipologia = ''; selMarca = '';
  hideAC('ac-tipologia');
  hideAC('ac-marca');
  hideAC('ac-matricola');
  document.getElementById('ins-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('ins-tipologia').focus(), 300);
}

function closeInsertModal() {
  document.getElementById('ins-modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

function hideAC(id) { document.getElementById(id).style.display = 'none'; }
function showAC(id, items, onSelect) {
  const el = document.getElementById(id);
  if (!items.length) { el.innerHTML = '<div class="ins-autocomplete-empty">Nessun risultato</div>'; }
  else {
    el.innerHTML = items.slice(0,30).map((it, i) =>
      `<div class="ins-autocomplete-item" data-idx="${i}" onmousedown="event.preventDefault()" onclick="(${onSelect.toString()})(${JSON.stringify(it)})">${esc(it)}</div>`
    ).join('');
  }
  el.style.display = 'block';
}

// Tipologie uniche da DB_MEZZI
function handleTipologiaInput() {
  const q = document.getElementById('ins-tipologia').value.toLowerCase();
  const opts = [...new Set(dbMezzi.map(r => r.tipologia).filter(Boolean))].sort();
  const filtered = q ? opts.filter(t => t.toLowerCase().includes(q)) : opts;
  showAC('ac-tipologia', filtered, (val) => {
    document.getElementById('ins-tipologia').value = val;
    selTipologia = val;
    hideAC('ac-tipologia');
    // reset dipendenti
    document.getElementById('ins-marca').value = '';
    document.getElementById('ins-matricola').value = '';
    selMarca = '';
    hideAC('ac-marca');
    hideAC('ac-matricola');
  });
}

// Marche filtrate per tipologia
function handleMarcaInput() {
  selTipologia = document.getElementById('ins-tipologia').value.trim();
  const q = document.getElementById('ins-marca').value.toLowerCase();
  let rows = dbMezzi;
  if (selTipologia) rows = rows.filter(r => r.tipologia.toLowerCase() === selTipologia.toLowerCase());
  const opts = [...new Set(rows.map(r => r.marca).filter(Boolean))].sort();
  const filtered = q ? opts.filter(m => m.toLowerCase().includes(q)) : opts;
  showAC('ac-marca', filtered, (val) => {
    document.getElementById('ins-marca').value = val;
    selMarca = val;
    hideAC('ac-marca');
    // reset matricola
    document.getElementById('ins-matricola').value = '';
    hideAC('ac-matricola');
    handleMatricolaInput();
  });
}

// Matricole filtrate per tipologia + marca
function handleMatricolaInput() {
  selTipologia = document.getElementById('ins-tipologia').value.trim();
  selMarca     = document.getElementById('ins-marca').value.trim();
  const q = document.getElementById('ins-matricola').value.toLowerCase();
  let rows = dbMezzi;
  if (selTipologia) rows = rows.filter(r => r.tipologia.toLowerCase() === selTipologia.toLowerCase());
  if (selMarca)     rows = rows.filter(r => r.marca.toLowerCase() === selMarca.toLowerCase());
  const opts = [...new Set(rows.map(r => r.matricola).filter(Boolean))].sort();
  const filtered = q ? opts.filter(m => m.toLowerCase().includes(q)) : opts;
  showAC('ac-matricola', filtered, (val) => {
    document.getElementById('ins-matricola').value = val;
    hideAC('ac-matricola');
  });
}

function submitAggiungiMezzo() {
  const tipologia = document.getElementById('ins-tipologia').value.trim();
  const marca     = document.getElementById('ins-marca').value.trim();
  const matricola = document.getElementById('ins-matricola').value.trim();

  if (!tipologia) { showToast('⚠️ Inserisci la Tipologia'); return; }
  if (!marca)     { showToast('⚠️ Inserisci Marca e Modello'); return; }
  if (!matricola) { showToast('⚠️ Inserisci Matricola / Targa'); return; }

  const subject = encodeURIComponent(`Richiesta aggiunta nuovo mezzo – ${tipologia} ${marca}`);
  const body    = encodeURIComponent(
    `Gentili,\n\nsi prega di aggiungere il seguente nuovo mezzo al sistema:\n\n` +
    `TIPOLOGIA:        ${tipologia}\n` +
    `MARCA E MODELLO:  ${marca}\n` +
    `MATRICOLA / TARGA: ${matricola}\n\n` +
    `Cantiere: ${CANTIERE_COMMESSA} – ${CANTIERE_NOME}\n\n` +
    `Grazie.`
  );
  const mailTo = encodeURIComponent(MAIL_TO.split(';')[0]);
  const cc     = encodeURIComponent(MAIL_TO.split(';').slice(1).join(';'));
  window.location.href = `mailto:${mailTo}?cc=${cc}&subject=${subject}&body=${body}`;
  closeInsertModal();
}

    const val = document.getElementById('ins-matricola').value.toUpperCase();
    const suggerimenti = [...new Set(dbMezzi.map(m => m.matricola))]
        .filter(m => m.includes(val));
    renderACList('matricola / targa', suggerimenti);
}
