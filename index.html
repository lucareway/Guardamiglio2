function parseCSVRaw(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function formatDate(raw) {
  if (!raw || raw === '') return null;
  const trimmed = String(raw).trim();
  const num = parseFloat(trimmed);
  if (!isNaN(num) && Number.isFinite(num) && trimmed.match(/^-?\d+(\.\d+)?$/)) {
    const date = new Date((num - 25569) * 86400000);
    if (!isNaN(date.getTime()) && date.getFullYear() > 1900) {
      return date.toLocaleDateString('it-IT');
    }
  }
  let d = new Date(trimmed);
  if (!isNaN(d.getTime()) && trimmed.match(/^\d{4}-\d{2}-\d{2}/)) {
    return d.toLocaleDateString('it-IT');
  }
  const parts = trimmed.split(/[\/\-]/);
  if (parts.length === 3) {
    const day = parseInt(parts[0], 10);
    const month = parseInt(parts[1], 10) - 1;
    const year = parseInt(parts[2], 10);
    if (!isNaN(day) && !isNaN(month) && !isNaN(year) && year > 1900 && year < 2100) {
      const d2 = new Date(year, month, day);
      if (d2.getDate() === day && d2.getMonth() === month) {
        return d2.toLocaleDateString('it-IT');
      }
    }
  }
  return trimmed;
}

function formatCanone(val, tipo) {
  if (!val || val === '') return null;
  const n = parseFloat(val.replace(',', '.').replace(/[^0-9.]/g, ''));
  let valoreFormattato = val;
  if (!isNaN(n) && n > 0) {
    valoreFormattato = new Intl.NumberFormat('it-IT', { style:'currency', currency:'EUR' }).format(n);
  }
  let tipoLabel = '';
  if (tipo === 'mensile') tipoLabel = 'Canone mensile';
  else if (tipo === 'giornaliero') tipoLabel = 'Canone giornaliero';
  else if (tipo === 'orario') tipoLabel = 'Canone orario';
  else return valoreFormattato;
  return `${tipoLabel}: ${valoreFormattato}`;
}

async function fetchCSV(url) {
  const res = await fetch(url + '&nocache=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.text();
}

function parseProspetto(text) {
  const rows = parseCSVRaw(text);
  return rows.slice(1)
    .filter(cols => (cols[1] || '').trim() === CANTIERE_COMMESSA)
    .map(cols => {
      const colB  = cols[1]  || '';
      const colE  = cols[4]  || '';
      const colF  = cols[5]  || '';
      const colG  = cols[6]  || '';
      const colH  = cols[7]  || '';
      const colI  = cols[8]  || '';
      const colJ  = cols[9]  || '';
      const colK  = cols[10] || '';
      const colL  = cols[11] || '';
      const colN  = cols[13] || '';
      const colAF = cols[31] || '';
      
      let canoneVal = '';
      let canoneType = '';
      if (colJ && colJ.trim()) {
        canoneVal = colJ.trim();
        canoneType = 'mensile';
      } else if (colK && colK.trim()) {
        canoneVal = colK.trim();
        canoneType = 'giornaliero';
      } else if (colL && colL.trim()) {
        canoneVal = colL.trim();
        canoneType = 'orario';
      }
      
      const statoRaw = colAF.trim().toLowerCase();
      const statoSheet = statoRaw.includes('reso') ? 'reso'
                       : statoRaw.includes('spostato') ? 'spostato'
                       : null;
      return {
        commessa: colB, tipo: colE.toUpperCase(), codice: colF,
        marca: colG, propNol: colH, proprietario: colI,
        canoneVal, canoneType,
        dataInizio: colN, statoSheet, statoAF: colAF,
        destinazioneAF: statoRaw.includes('spostato in') ? colAF.replace(/^spostato in\s*/i, '').trim() : '',
      };
    })
    .filter(d => d.codice);
}

function parseCodiciCommessa(text) {
  const rows = parseCSVRaw(text);
  return rows.slice(1)
    .map(cols => ({ codice: (cols[1]||'').trim(), desc: (cols[2]||'').trim() }))
    .filter(c => c.codice);
}

function parseCantieri(text) {
  const rows = parseCSVRaw(text);
  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const colB = (rows[i][1] || '').trim();
    const colC = (rows[i][2] || '').trim();
    if (colB.length > 0 || colC.length > 0) {
      result.push(colB + (colC ? ' ' + colC : ''));
    }
  }
  return result;
}

async function loadData() {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot loading';
  lbl.textContent = 'Aggiornamento...';
  try {
    const [txtPros, txtCod, txtCantieri] = await Promise.all([
      fetchCSV(CSV_PROSPETTO),
      fetchCSV(CSV_CODICI),
      fetchCSV(CSV_CANTIERI)
    ]);
    data = parseProspetto(txtPros);
    codiciCommessa = parseCodiciCommessa(txtCod);
    cantieri = parseCantieri(txtCantieri);

    stati = {};
    data.forEach(d => {
      if (d.statoSheet) {
        stati[d.codice] = d.statoSheet;
        if (d.statoSheet === 'spostato' && d.destinazioneAF) {
          destinazioni[d.codice] = d.destinazioneAF;
        }
      }
    });
    saveStati();

    const now = new Date().toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
    dot.className = 'sync-dot';
    lbl.textContent = `Aggiornato alle ${now} · ${data.length} mezzi · ${cantieri.length} cantieri`;
    renderFilters();
    render();
  } catch(e) {
    dot.className = 'sync-dot error';
    lbl.textContent = 'Errore di connessione';
    document.getElementById('cards').innerHTML = '<div class="empty">Impossibile caricare i dati.<br>Verifica la connessione e riprova.</div>';
    console.error(e);
  }
}

function getTypes() {
  const types = ['Tutti', ...new Set(data.map(d => d.tipo).filter(Boolean))].sort((a,b) => a === 'Tutti' ? -1 : a.localeCompare(b));
  types.push('RESO', 'SPOSTATO IN');
  return types;
}

function renderFilters() {
  document.getElementById('filters').innerHTML = getTypes().map(t => {
    const extra = t === 'RESO' ? 'reso-chip' : t === 'SPOSTATO IN' ? 'spostato-chip' : '';
    return `<span class="chip ${extra} ${t===activeFilter?'active':''}" onclick="setFilter('${t}')">${t}</span>`;
  }).join('');
}

function setFilter(t) { activeFilter = t; renderFilters(); render(); }

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return data.filter(d => {
    let mF;
    if      (activeFilter === 'Tutti')       mF = true;
    else if (activeFilter === 'RESO')        mF = stati[d.codice] === 'reso';
    else if (activeFilter === 'SPOSTATO IN') mF = stati[d.codice] === 'spostato';
    else                                     mF = d.tipo === activeFilter;
    const mQ = !q || [d.tipo, d.marca, d.propNol, d.proprietario, d.codice].join(' ').toLowerCase().includes(q);
    return mF && mQ;
  });
}

function render() {
  const items = filtered();
  document.getElementById('count').textContent = items.length + (items.length === 1 ? ' mezzo trovato' : ' mezzi trovati');
  if (!items.length) {
    document.getElementById('cards').innerHTML = '<div class="empty">Nessun risultato trovato.<br>Prova a cambiare il filtro o la ricerca.</div>';
    return;
  }
  document.getElementById('cards').innerHTML = items.map(d => {
    const c = BADGE_COLORS[d.tipo] || BADGE_COLORS.DEFAULT;
    const stato = stati[d.codice];
    const statoClass = stato ? 'stato-' + stato : '';
    const statoBadge = stato === 'reso'
      ? '<span class="stato-badge reso">RESO AL NOLEGGIATORE</span>'
      : stato === 'spostato'
      ? `<span class="stato-badge spostato">SPOSTATO IN ${destinazioni[d.codice] || ''}</span>`
      : '';
    const dataFormattata = formatDate(d.dataInizio);
    const canoneFormattato = formatCanone(d.canoneVal, d.canoneType);
    return `<div class="card ${statoClass}" data-codice="${esc(d.codice)}">
      <div class="card-top" onclick="openModal('${esc(d.codice)}')">
        <div class="card-title">${esc(d.marca) || '—'}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="badge" style="background:${c.bg};color:${c.fg}">${d.tipo || '—'}</span>
          ${statoBadge}
        </div>
      </div>
      <div class="card-meta" onclick="openModal('${esc(d.codice)}')">
        <div class="meta-row"><span class="meta-label">Matricola</span><span class="meta-value">${esc(d.codice) || '—'}</span></div>
        <div class="meta-row"><span class="meta-label">Proprietà</span><span class="meta-value">${esc(d.propNol) || '—'}</span></div>
        <div class="meta-row"><span class="meta-label">Proprietario</span><span class="meta-value">${esc(d.proprietario) || '—'}</span></div>
        ${canoneFormattato ? `<div class="meta-row"><span class="meta-label">Canone</span><span class="meta-value">${esc(canoneFormattato)}</span></div>` : ''}
        ${dataFormattata ? `<div class="meta-row"><span class="meta-label">Inizio noleggio</span><span class="meta-value">${esc(dataFormattata)}</span></div>` : ''}
      </div>
      <button class="btn-richiesta-restituzione" onclick="event.stopPropagation(); openRestituzioneModal('${esc(d.codice)}')">RICHIEDI RESTITUZIONE</button>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════════════
//  MODALE DETTAGLIO MEZZO (esistente)
// ══════════════════════════════════════════════════════════════════════════════
function openModal(codice) {
  currentId = codice;
  const d = data.find(x => x.codice === codice);
  if (!d) return;
  const c = BADGE_COLORS[d.tipo] || BADGE_COLORS.DEFAULT;
  const stato = stati[codice];
  document.getElementById('modal-badge').innerHTML =
    `<span class="badge" style="background:${c.bg};color:${c.fg};display:inline-block">${d.tipo || '—'}</span>`
    + (stato === 'reso'     ? '<span class="stato-badge reso">RESO AL NOLEGGIATORE</span>' : '')
    + (stato === 'spostato' ? `<span class="stato-badge spostato">SPOSTATO IN${destinazioni[codice] ? ' ' + destinazioni[codice] : ''}</span>` : '');
  document.getElementById('modal-title').textContent = d.marca || 'Dettaglio mezzo';
  const dataFormattata = formatDate(d.dataInizio);
  const canoneFormattato = formatCanone(d.canoneVal, d.canoneType);
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-field"><label>Marca e Modello</label><div class="val">${esc(d.marca) || '—'}</div></div>
    <div class="modal-field"><label>Matricola / Targa</label><div class="val ${!d.codice?'empty-val':''}">${esc(d.codice) || 'Non specificata'}</div></div>
    <div class="modal-field"><label>Tipologia</label><div class="val">${esc(d.tipo) || '—'}</div></div>
    <div class="modal-field"><label>Proprietà / Noleggio</label><div class="val ${!d.propNol?'empty-val':''}">${esc(d.propNol) || 'Non specificato'}</div></div>
    <div class="modal-field"><label>Proprietario</label><div class="val ${!d.proprietario?'empty-val':''}">${esc(d.proprietario) || 'Non specificato'}</div></div>
    <div class="modal-field"><label>Canone</label><div class="val ${!canoneFormattato?'empty-val':''}">${canoneFormattato ? esc(canoneFormattato) : 'Non specificato'}</div></div>
    <div class="modal-field"><label>Data inizio noleggio</label><div class="val ${!dataFormattata?'empty-val':''}">${dataFormattata ? esc(dataFormattata) : 'Non specificata'}</div></div>
  `;
  document.getElementById('btn-reso').className     = 'btn-stato btn-reso'     + (stato === 'reso'     ? ' attivo' : '');
  document.getElementById('btn-spostato').className = 'btn-stato btn-spostato' + (stato === 'spostato' ? ' attivo' : '');
  document.getElementById('spostato-panel').classList.remove('open');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

function renderDestOptions() {
  const q = (document.getElementById('dest-search').value || '').toLowerCase();
  const list = document.getElementById('spostato-options-list');
  const opzioni = cantieri.filter(c => !q || c.toLowerCase().includes(q));

  list.innerHTML = opzioni.map((c, i) => {
    return `<label class="spostato-option" id="opt-dest-${i}">
      <input type="radio" name="spostato-dest" value="${esc(c)}"> ${esc(c)}
    </label>`;
  }).join('');

  list.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener('change', () => {
      document.querySelectorAll('.spostato-option').forEach(o => o.classList.remove('selected'));
      r.closest('.spostato-option').classList.add('selected');
    });
  });
  list.querySelectorAll('.spostato-option').forEach(lbl => {
    lbl.addEventListener('click', () => {
      document.querySelectorAll('.spostato-option').forEach(o => o.classList.remove('selected'));
      lbl.classList.add('selected');
      const radio = lbl.querySelector('input[type=radio]');
      if (radio) radio.checked = true;
    });
  });
}

function openSpostatoPanel() {
  const panel = document.getElementById('spostato-panel');
  panel.classList.toggle('open');
  document.getElementById('dest-search').value = '';
  document.getElementById('dest-libera').value = '';
  renderDestOptions();
}

function confirmSpostato() {
  const selected = document.querySelector('input[name="spostato-dest"]:checked');
  if (!selected) { showToast('⚠️ Seleziona una destinazione'); return; }
  let dest = selected.value;
  if (dest === '__altro__') {
    dest = document.getElementById('dest-libera').value.trim();
    if (!dest) { showToast('⚠️ Scrivi una destinazione'); return; }
  }
  setStato('spostato', dest);
  document.getElementById('spostato-panel').classList.remove('open');
}

function setStato(valore, destinazione) {
  if (currentId === null) return;
  if (valore === null) {
    delete stati[currentId];
    delete destinazioni[currentId];
    document.getElementById('spostato-panel').classList.remove('open');
  } else {
    stati[currentId] = valore;
    if (destinazione) destinazioni[currentId] = destinazione;
  }
  saveStati();
  render();
  openModal(currentId);
}

// ══════════════════════════════════════════════════════════════════════════════
//  MODALE RICHIESTA RESTITUZIONE
// ══════════════════════════════════════════════════════════════════════════════
function openRestituzioneModal(codiceMezzo) {
  const mezzo = data.find(m => m.codice === codiceMezzo);
  if (!mezzo) return;
  currentRichiestaMezzo = mezzo;
  
  // Precompila campi
  document.getElementById('richiesta_commessa').value = CANTIERE_COMMESSA;
  document.getElementById('richiesta_cantiere').value = CANTIERE_NOME;
  document.getElementById('richiesta_marca_modello').value = mezzo.marca || 'Non specificato';
  document.getElementById('richiesta_matricola').value = mezzo.codice || 'Non specificata';
  
  // Reset campi e errori
  document.getElementById('richiesta_nominativo').value = '';
  document.getElementById('richiesta_datetime').value = '';
  document.getElementById('error_nominativo').style.display = 'none';
  document.getElementById('error_datetime').style.display = 'none';
  
  document.getElementById('restituzione-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function inviaRichiestaRestituzione() {
  const nominativo = document.getElementById('richiesta_nominativo').value.trim();
  const datetime = document.getElementById('richiesta_datetime').value;
  const note = document.getElementById('richiesta_note').value.trim(); // <-- NUOVO
  
  let isValid = true;
  if (!nominativo) {
    document.getElementById('error_nominativo').style.display = 'block';
    isValid = false;
  } else {
    document.getElementById('error_nominativo').style.display = 'none';
  }
  if (!datetime) {
    document.getElementById('error_datetime').style.display = 'block';
    isValid = false;
  } else {
    document.getElementById('error_datetime').style.display = 'none';
  }
  
  if (!isValid) return;
  
  const mezzo = currentRichiestaMezzo;
  if (!mezzo) return;
  
  const dataOraLeggibile = new Date(datetime).toLocaleString('it-IT', { dateStyle: 'full', timeStyle: 'short' });
  
  const oggetto = `RICHIESTA RESTITUZIONE - Mezzo ${mezzo.codice} - ${mezzo.marca}`;
  let corpo = `Richiesta restituzione mezzo dal cantiere ${CANTIERE_NOME} (Commessa ${CANTIERE_COMMESSA})\n\n`;
  corpo += `DATI MEZZO:\n`;
  corpo += `- Marca/Modello: ${mezzo.marca || 'N/D'}\n`;
  corpo += `- Matricola/Targa: ${mezzo.codice || 'N/D'}\n`;
  corpo += `- Tipologia: ${mezzo.tipo || 'N/D'}\n\n`;
  corpo += `RICHIESTO DA:\n`;
  corpo += `- Nominativo richiedente: ${nominativo}\n`;
  corpo += `- Data e ora entro cui ritirarlo: ${dataOraLeggibile}\n`;
  // Aggiunta note
  if (note) {
    corpo += `- Note: ${note}\n`;
  } else {
    corpo += `- Note: (nessuna nota)\n`;
  }
  corpo += `\nCantiere di partenza: ${CANTIERE_NOME}\n`;
  corpo += `Codice commessa: ${CANTIERE_COMMESSA}\n`;
  corpo += `---\nRichiesta generata automaticamente dal gestionale mezzi.`;
  
  const destinatari = DESTINATARI_EMAIL.join(',');
  const mailtoLink = `mailto:${destinatari}?subject=${encodeURIComponent(oggetto)}&body=${encodeURIComponent(corpo)}`;
  
  window.location.href = mailtoLink;
  showToast('📧 Apertura programma email... Controlla e invia.', 3000);
  closeRestituzioneModal();
}

function showToast(msg, duration = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ══════════════════════════════════════════════════════════════════════════════
//  ESPORTA VARIAZIONI (invariato)
// ══════════════════════════════════════════════════════════════════════════════
async function openExport() {
  const btn = document.getElementById('export-btn');
  const conStato = data.filter(d => stati[d.codice]);

  if (!conStato.length) {
    showToast('⚠️ Nessun mezzo ha uno stato assegnato.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Esportazione...';

  const payload = {
    foglio: 'PROSPETTO_CANTIERI_DEF',
    colonna_chiave: 'F',
    colonna_output: 'AF',
    commessa: CANTIERE_COMMESSA,
    variazioni: conStato.map(d => {
      const s = stati[d.codice];
      const valore = s === 'reso'
        ? 'RESO AL NOLEGGIATORE'
        : 'SPOSTATO IN ' + (destinazioni[d.codice] || '').trim();
      return {
        matricola: d.codice.trim(),
        valore
      };
    })
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (json.status === 'ok') {
      const msg = json.aggiornati > 0
        ? `✅ ${json.aggiornati} variazioni scritte sul foglio!`
          + (json.nonTrovati > 0 ? `\n⚠️ ${json.nonTrovati} matricole non trovate.` : '')
        : '⚠️ Nessuna matricola trovata nel foglio. Verifica i codici.';
      showToast(msg, 5000);
    } else {
      showToast('❌ Errore: ' + (json.error || 'risposta non valida'), 5000);
    }
  } catch(e) {
    showToast('❌ Connessione fallita: ' + e.message, 5000);
  } finally {
    btn.disabled = false;
    btn.textContent = 'ESPORTA VARIAZIONI';
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
